<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WirtschaftsHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--black:#0A0A0A;
--dark:#111318;
--panel:#1A1D24;
--card:#1E2128;
--border:#2A2D36;
--accent:#E8C420;
--red:#E84020;
--white:#FFFFFF;
--muted:#6B7280;
--light:#9CA3AF;
--green:#22C55E
}

body{
font-family:'Inter',sans-serif;
background:var(--dark);
color:var(--white);
min-height:100vh
}

.login-wrap{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:var(--black);
position:relative;
overflow:hidden
}

/* FIXED */
.login-wrap::before{
content:'';
position:absolute;
inset:0;
background:radial-gradient(ellipse at 50% 50%,rgba(232,196,32,0.04) 0%,transparent 70%);
pointer-events:none;
}

.login-box{
background:var(--panel);
border:1px solid var(--border);
padding:52px 44px;
width:100%;
max-width:400px;
border-top:3px solid var(--accent);
position:relative;
z-index:2;
}

.login-logo{margin-bottom:6px;display:flex;align-items:baseline}

.logo-w{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:800;
color:var(--white)
}

.logo-hub{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:800;
color:var(--accent)
}

.login-sub{
font-size:10px;
letter-spacing:3px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:36px;
font-weight:600
}

.field{margin-bottom:20px}

.field label{
display:block;
font-size:10px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:8px
}

.field input{
width:100%;
padding:12px 16px;
border:1px solid var(--border);
font-size:15px;
outline:none;
background:var(--card);
color:var(--white)
}

.field input:focus{border-color:var(--accent)}

.login-btn{
width:100%;
padding:14px;
background:var(--accent);
color:var(--black);
border:none;
font-size:11px;
font-weight:800;
letter-spacing:2.5px;
text-transform:uppercase;
cursor:pointer
}

.login-btn:hover{opacity:.85}

.login-err{
color:var(--red);
font-size:12px;
margin-top:10px;
display:none;
text-align:center
}

.admin-wrap{display:none;min-height:100vh}

.admin-header{
background:var(--black);
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
border-bottom:2px solid var(--accent)
}

.al{display:flex;align-items:baseline}

.admin-nav{display:flex;gap:4px}

.admin-nav button{
background:transparent;
border:1px solid var(--border);
color:var(--light);
padding:7px 16px;
font-size:10px;
cursor:pointer
}

.admin-nav button:hover,
.admin-nav button.active{
background:var(--accent);
border-color:var(--accent);
color:var(--black)
}

.logout-btn{
background:none;
border:none;
color:var(--muted);
cursor:pointer
}

.view-btn{
border:1px solid var(--border);
color:var(--light);
padding:7px 16px;
text-decoration:none;
font-size:10px
}

.admin-body{
max-width:1100px;
margin:0 auto;
padding:32px 28px
}

.panel{display:none}
.panel.active{display:block}

.panel-title{
font-family:'Playfair Display',serif;
font-size:26px;
margin-bottom:24px
}

.stats-row{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:28px
}

.stat-card{
background:var(--card);
border:1px solid var(--border);
padding:24px
}

.stat-num{
font-size:46px;
font-weight:900;
color:var(--accent)
}

.editor-grid{
display:grid;
grid-template-columns:1fr 280px;
gap:20px
}

.editor-main{
background:var(--card);
border:1px solid var(--border);
padding:32px
}

.editor-side{
display:flex;
flex-direction:column;
gap:12px
}

.side-box{
background:var(--card);
border:1px solid var(--border);
padding:20px
}

.title-input{
font-family:'Playfair Display',serif;
font-size:26px;
border:none;
background:transparent;
color:var(--white);
width:100%;
margin-bottom:16px
}

.form-field textarea{
width:100%;
min-height:380px;
background:var(--panel);
border:1px solid var(--border);
color:var(--white);
padding:12px
}

.publish-btn{
width:100%;
padding:13px;
background:var(--accent);
border:none;
font-weight:800;
cursor:pointer
}

.cancel-btn{
width:100%;
padding:9px;
border:1px solid var(--border);
background:none;
color:var(--muted)
}

.posts-table{
background:var(--card);
border:1px solid var(--border)
}

.post-row{
display:grid;
grid-template-columns:1fr 140px 120px 110px;
padding:16px 20px;
border-bottom:1px solid var(--border)
}

</style>
</head>

<body>

<div class="login-wrap" id="login-screen">

<div class="login-box">

<div class="login-logo">
<span class="logo-w">Wirtschafts</span>
<span class="logo-hub">Hub</span>
</div>

<div class="login-sub">Redaktionssystem</div>

<div class="field">
<label>Passwort</label>
<input type="password" id="pw-input" autofocus placeholder="Passwort eingeben..." onkeydown="if(event.key==='Enter')doLogin()">
</div>

<button class="login-btn" onclick="doLogin()">ANMELDEN →</button>

<div class="login-err" id="login-err">⚠ Falsches Passwort</div>

</div>
</div>

<div class="admin-wrap" id="admin-panel">

<div class="admin-header">

<div class="al">
<span class="logo-w">Wirtschafts</span>
<span class="logo-hub">Hub</span>
</div>

<div class="admin-nav">
<button class="active" onclick="showPanel('dashboard',this)">Dashboard</button>
<button onclick="showPanel('new-post',this)">Neuer Artikel</button>
<button onclick="showPanel('all-posts',this)">Alle Artikel</button>
<a href="index.html" target="_blank" class="view-btn">Website</a>
<button class="logout-btn" onclick="logout()">Abmelden</button>
</div>

</div>

<div class="admin-body">

<div class="panel active" id="panel-dashboard">
<div class="panel-title">Dashboard</div>

<div class="stats-row">
<div class="stat-card"><div class="stat-num" id="stat-total">0</div>Artikel</div>
<div class="stat-card"><div class="stat-num" id="stat-today">0</div>Heute</div>
<div class="stat-card"><div class="stat-num" id="stat-cats">0</div>Kategorien</div>
<div class="stat-card"><div class="stat-num">📈</div>Märkte</div>
</div>

<button class="publish-btn" onclick="showPanel('new-post')">Artikel erstellen</button>

</div>

<div class="panel" id="panel-new-post">

<div class="panel-title">Neuer Artikel</div>

<div class="editor-grid">

<div class="editor-main">

<input class="title-input" type="text" id="post-title" placeholder="Schlagzeile eingeben">

<div class="form-field">
<textarea id="post-content"></textarea>
</div>

</div>

<div class="editor-side">

<div class="side-box">
<button class="publish-btn" onclick="publishPost()">Veröffentlichen</button>
<button class="cancel-btn" onclick="clearEditor()">Abbrechen</button>
</div>

</div>

</div>

</div>

<div class="panel" id="panel-all-posts">

<div class="panel-title">Alle Artikel</div>

<div class="posts-table">
<div id="posts-list"></div>
</div>

</div>

</div>

</div>

<script>

const PASS='germanadmin00#hamzauthority1'
let editingId=null

function doLogin(){

if(document.getElementById('pw-input').value===PASS){

document.getElementById('login-screen').style.display='none'
document.getElementById('admin-panel').style.display='block'

loadDashboard()

}else{

document.getElementById('login-err').style.display='block'
document.getElementById('pw-input').value=''

}

}

function logout(){

document.getElementById('login-screen').style.display='flex'
document.getElementById('admin-panel').style.display='none'

}

function showPanel(name){

document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'))
document.getElementById('panel-'+name).classList.add('active')

}

function getPosts(){

return JSON.parse(localStorage.getItem('db_posts')||'[]')

}

function savePosts(p){

localStorage.setItem('db_posts',JSON.stringify(p))

}

function publishPost(){

const title=document.getElementById('post-title').value
const content=document.getElementById('post-content').value

if(!title||!content){
alert('Titel und Inhalt eingeben')
return
}

const posts=getPosts()

posts.push({
id:Date.now(),
title,
content,
date:new Date().toISOString()
})

savePosts(posts)

clearEditor()

}

function clearEditor(){

document.getElementById('post-title').value=''
document.getElementById('post-content').value=''

}

function loadDashboard(){

const posts=getPosts()

document.getElementById('stat-total').textContent=posts.length

}

</script>

</body>
</html>
