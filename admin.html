<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — WirtschaftsHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

:root{
--black:#0A0A0A;
--dark:#111318;
--panel:#1A1D24;
--card:#1E2128;
--border:#2A2D36;
--accent:#E8C420;
--red:#E84020;
--white:#FFFFFF;
--muted:#6B7280;
--light:#9CA3AF;
--green:#22C55E
}

body{
font-family:'Inter',sans-serif;
background:var(--dark);
color:var(--white);
min-height:100vh
}

.login-wrap{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:var(--black);
position:relative;
overflow:hidden
}

/* FIXED OVERLAY */
.login-wrap::before{
content:'';
position:absolute;
inset:0;
background:radial-gradient(ellipse at 50% 50%,rgba(232,196,32,0.04) 0%,transparent 70%);
pointer-events:none;
}

.login-box{
background:var(--panel);
border:1px solid var(--border);
padding:52px 44px;
width:100%;
max-width:400px;
border-top:3px solid var(--accent);
position:relative;
z-index:2;
}

.login-logo{margin-bottom:6px;display:flex;align-items:baseline}

.logo-w{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:800;
color:var(--white)
}

.logo-hub{
font-family:'Playfair Display',serif;
font-size:28px;
font-weight:800;
color:var(--accent)
}

.login-sub{
font-size:10px;
letter-spacing:3px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:36px;
font-weight:600
}

.field{margin-bottom:20px}

.field label{
display:block;
font-size:10px;
font-weight:700;
letter-spacing:2px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:8px
}

.field input{
width:100%;
padding:12px 16px;
border:1px solid var(--border);
font-size:15px;
outline:none;
background:var(--card);
color:var(--white)
}

.field input:focus{border-color:var(--accent)}

.login-btn{
width:100%;
padding:14px;
background:var(--accent);
color:var(--black);
border:none;
font-size:11px;
font-weight:800;
letter-spacing:2.5px;
text-transform:uppercase;
cursor:pointer
}

.login-btn:hover{opacity:.85}

.login-err{
color:var(--red);
font-size:12px;
margin-top:10px;
display:none;
text-align:center
}

.admin-wrap{display:none;min-height:100vh}

.admin-header{
background:var(--black);
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
border-bottom:2px solid var(--accent)
}

.admin-nav{display:flex;gap:4px}

.admin-nav button{
background:transparent;
border:1px solid var(--border);
color:var(--light);
padding:7px 16px;
font-size:10px;
cursor:pointer
}

.admin-nav button:hover,
.admin-nav button.active{
background:var(--accent);
border-color:var(--accent);
color:var(--black)
}

.admin-body{
max-width:1100px;
margin:0 auto;
padding:32px 28px
}

.panel{display:none}
.panel.active{display:block}

.editor-grid{
display:grid;
grid-template-columns:1fr 280px;
gap:20px
}

.editor-main{
background:var(--card);
border:1px solid var(--border);
padding:32px
}

.toolbar{
display:flex;
gap:5px;
flex-wrap:wrap;
margin-bottom:12px
}

.toolbar button{
background:var(--panel);
border:1px solid var(--border);
padding:5px 12px;
cursor:pointer;
color:var(--light)
}

.toolbar button:hover{
background:var(--accent);
color:var(--black)
}

#post-content{
min-height:380px;
resize:vertical;
background:var(--panel);
border:1px solid var(--border);
color:var(--white);
padding:12px
}

</style>
</head>

<body>

<div class="login-wrap" id="login-screen">

<div class="login-box">

<div class="login-logo">
<span class="logo-w">Wirtschafts</span>
<span class="logo-hub">Hub</span>
</div>

<div class="login-sub">Redaktionssystem</div>

<div class="field">
<label>Passwort</label>
<input type="password" id="pw-input" autofocus placeholder="Passwort eingeben..." onkeydown="if(event.key==='Enter')doLogin()">
</div>

<button class="login-btn" onclick="doLogin()">ANMELDEN →</button>

<div class="login-err" id="login-err">⚠ Falsches Passwort</div>

</div>
</div>

<div class="admin-wrap" id="admin-panel">

<div class="admin-body">

<div class="panel active" id="panel-new-post">

<div class="editor-grid">

<div class="editor-main">

<input type="text" id="post-title" placeholder="Schlagzeile eingeben..." style="width:100%;margin-bottom:20px;padding:10px">

<div class="toolbar">
<button onclick="fmt('bold')"><b>B</b></button>
<button onclick="fmt('italic')"><i>I</i></button>
<button onclick="wrapTag('h2')">H2</button>
<button onclick="wrapTag('h3')">H3</button>
<button onclick="wrapTag('blockquote')">❝</button>
<button onclick="insertLink()">🔗 Link</button>
<button onclick="wrapTag('ul')">Liste</button>
</div>

<textarea id="post-content"></textarea>

</div>

</div>

</div>

</div>

<script>

const PASS='germanadmin00#hamzauthority1'

function doLogin(){

if(document.getElementById('pw-input').value===PASS){

document.getElementById('login-screen').style.display='none'
document.getElementById('admin-panel').style.display='block'

}else{

document.getElementById('login-err').style.display='block'
document.getElementById('pw-input').value=''

}

}

function fmt(cmd){

const ta=document.getElementById('post-content')
const s=ta.selectionStart
const e=ta.selectionEnd

const sel=ta.value.substring(s,e)

const tag=cmd==='bold'?'strong':'em'

ta.value=ta.value.substring(0,s)+`<${tag}>${sel}</${tag}>`+ta.value.substring(e)

}

function wrapTag(tag){

const ta=document.getElementById('post-content')

const s=ta.selectionStart
const e=ta.selectionEnd

const sel=ta.value.substring(s,e)||'Text hier'

const w=tag==='ul'
?`<ul>
<li>${sel}</li>
</ul>`
:`<${tag}>${sel}</${tag}>`

ta.value=ta.value.substring(0,s)+w+ta.value.substring(e)

}

function insertLink(){

const url=prompt('URL:')

if(!url)return

const ta=document.getElementById('post-content')

const s=ta.selectionStart
const e=ta.selectionEnd

const sel=ta.value.substring(s,e)||'Link'

ta.value=ta.value.substring(0,s)+`<a href="${url}">${sel}</a>`+ta.value.substring(e)

}

</script>

</body>
</html>
